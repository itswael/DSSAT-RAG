version: '3.8'

services:
  dssat-chatbot-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dssat-rag-chatbot-ui
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=http://host.docker.internal:5678
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - dssat-network

  # Uncomment to also run n8n in Docker
  # n8n:
  #   image: n8nio/n8n:latest
  #   container_name: n8n-instance
  #   ports:
  #     - "5678:5678"
  #   environment:
  #     - N8N_BASIC_AUTH_ACTIVE=false
  #     - N8N_PROTOCOL=http
  #     - N8N_HOST=localhost
  #     - WEBHOOK_URL=http://n8n:5678
  #   volumes:
  #     - n8n_storage:/home/node/.n8n
  #   networks:
  #     - dssat-network

networks:
  dssat-network:
    driver: bridge

